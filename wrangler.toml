# Cloudflare Pages configuration.
# The whole repo is served as static files; the /functions directory becomes
# Pages Functions automatically.

name = "pilot-training-hub"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

# KV namespace for temporary access codes and session tokens.
# Replace `id` with the namespace id from `wrangler kv namespace create CODES`,
# or bind it in the Pages dashboard (Settings → Functions → KV bindings).
[[kv_namespaces]]
binding = "CODES"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets (BOT_TOKEN, CHAT_ID, WEBHOOK_SECRET) are NOT stored here.
# Local dev  -> put them in .dev.vars (git-ignored).
# Production -> add them as encrypted secrets in the Pages dashboard.
